{% extends "main/base.html" %}

{% block title %}Delete character | {{ project.title }}{% endblock %}

{% block content %}
  <div class="page-shell">
    <section class="card page-hero page-confirm">
      <div class="page-hero-head">
        <div>
          <span class="page-kicker">Danger zone</span>
          <h1 class="page-title">Delete character</h1>
        </div>
        <div class="actions">
          <a class="btn btn-secondary" href="{% url 'project-dashboard' slug=project.slug %}">Dashboard</a>
          <a class="btn btn-secondary" href="{% url 'character-list' slug=project.slug %}">Characters</a>
        </div>
      </div>
      <p class="page-lead">Delete <strong>{{ object.name }}</strong> from <strong>{{ project.title }}</strong>?</p>
    </section>

    <section class="card page-panel">
      <form method="post" class="actions">
        {% csrf_token %}
        <button class="btn btn-primary" type="submit">Delete character</button>
        <a class="btn btn-secondary" href="{% url 'character-edit' slug=project.slug pk=object.id %}">Cancel</a>
      </form>
    </section>
  </div>
{% endblock %}
